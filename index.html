<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#book{
width:350px;
height:500px;
}

.page img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<div id="book">

<div class="page"><img src="1.jpg"></div>
<div class="page"><img src="2.jpg"></div>
<div class="page"><img src="3.jpg"></div>
<div class="page"><img src="4.jpg"></div>
<div class="page"><img src="5.jpg"></div>
<div class="page"><img src="6.jpg"></div>
<div class="page"><img src="7.jpg"></div>
<div class="page"><img src="8.jpg"></div>

</div>

<script>

const pageFlip = new St.PageFlip(document.getElementById("book"), {
width:350,
height:500,
showCover:true
});

pageFlip.loadFromHTML(document.querySelectorAll(".page"));

</script>

</body>
</html>
